<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HK Camping Club Event Registration</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }
    .form-container {
      max-width: 600px;
      margin: auto;
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h1 {
      text-align: center;
      color: #2c3e50;
    }
    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }
    input, select, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      margin-top: 20px;
      padding: 12px;
      width: 100%;
      background: #27ae60;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover {
      background: #219150;
    }
    .back-btn {
      margin-top: 15px;
      padding: 12px;
      width: 100%;
      background: #34495e;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      cursor: pointer;
      text-align: center;
    }
    .back-btn:hover {
      background: #2c3e50;
    }
  </style>
</head>
<body>
  <div class="form-container">
    <h1>Event Registration</h1>
    <form action="#" method="post">
      <label for="fullname">Full Name</label>
      <input type="text" id="fullname" name="fullname" required>

      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" required>

      <label for="phone">Phone Number</label>
      <input type="tel" id="phone" name="phone" placeholder="e.g. +852-1234-5678" required>

      <label for="event">Select Event</label>
      <select id="event" name="event" required>
        <option value="">-- Choose an event --</option>
        <option value="night-sky">3 May 2026 – Night Sky Observation</option>
        <option value="eco-workshop">17 May 2026 – Eco-Friendly Workshop</option>
        <option value="newsletter">31 May 2026 – Monthly Newsletter Release</option>
        <option value="family-picnic">14 Jun 2026 – Summer Family Picnic</option>
        <option value="kayaking">28 Jun 2026 – Kayaking Adventure</option>
      </select>

      <label for="comments">Additional Notes</label>
      <textarea id="comments" name="comments" rows="4" placeholder="Any special requests or questions..."></textarea>

      <button type="submit">Register Now</button>
    </form>

    <!-- Back to Home Button -->
    <a href="index.html">
      <div class="back-btn">⬅ Back to Home</div>
    </a>
  </div>
</body>
</html>
